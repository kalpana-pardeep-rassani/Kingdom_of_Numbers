<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom of Numbers - Math Learning Game</title>
    
    <!-- CSS Files (in order) -->
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/responsive.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <!-- Main App Container -->
    <div id="app" class="app-container">
        <!-- This will be filled dynamically by JavaScript -->
    </div>

    <!-- JavaScript Files (in dependency order) -->
    <!-- Layer 1: Data (no dependencies) -->
    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    
    <!-- Layer 2: Storage & Utils (no dependencies) -->
    <script src="js/storage.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/audio.js"></script>
    
    <!-- Layer 3: UI Rendering (depends on data, utils) -->
    <script src="js/ui.js"></script>
    <script src="js/admin.js"></script>
    
    <!-- Layer 4: Business Logic (depends on storage, ui) -->
    <script src="js/auth.js"></script>
    <script src="js/game.js"></script>
    
    <!-- Layer 5: Main App Controller (depends on everything) -->
    <script src="js/app.js"></script>
    
</body>
</html>
